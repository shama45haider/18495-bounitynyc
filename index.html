<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BoUnit - Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: url('background.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  overflow-x: hidden;
}

/* Optimized Hero Black Gradient */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.85) 0%,
      rgba(0,0,0,0.65) 25%,
      rgba(0,0,0,0.45) 55%,
      rgba(0,0,0,0.6) 100%
    );
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 900px;
  text-align: center;
  padding: 40px 20px;
}

/* Logo */
.logo-wrap {
  width: 200px;
  margin: 0 auto 20px;
}

.logo-wrap img {
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(0,150,255,0.25));
}

.title {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.subtitle {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 18px;
}

.social {
  font-size: 16px;
  margin-bottom: 30px;
}

/* Newsletter */
.newsletter {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 6px;
  text-align: left;
}

.newsletter h3 {
  margin-bottom: 10px;
}

.newsletter p {
  margin-bottom: 15px;
  opacity: 0.7;
}

.form {
  display: flex;
  gap: 8px;
}

.form input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

.form button {
  padding: 12px 20px;
  border: none;
  background: #111;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.form button:hover {
  background: #000;
}

.small {
  font-size: 11px;
  margin-top: 8px;
  opacity: 0.5;
}

/* Optimized Particles (less lag) */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}

.particles span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(0,150,255,0.4);
  border-radius: 50%;
  animation: float 12s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* Mobile Optimization */
@media (max-width: 600px) {
  .logo-wrap {
    width: 140px;
  }

  .title {
    font-size: 22px;
  }

  .subtitle {
    font-size: 12px;
  }

  .form {
    flex-direction: column;
  }

  .form button {
    width: 100%;
  }
}

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="wrapper">
  
  <div class="logo-wrap">
    <img src="logo.png" alt="BoUnit Logo">
  </div>

  <div class="title">IN PROGRESS...</div>
  <div class="subtitle">GET FUTURE UPDATES THROUGH OUR SOCIALS!</div>

  <div class="social">
    <a href="https://www.instagram.com/bounit.104/" target="_blank" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:white;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
        <path d="M7.75 2C4.574 2 2 4.574 2 7.75v8.5C2 19.426 4.574 22 7.75 22h8.5C19.426 22 22 19.426 22 16.25v-8.5C22 4.574 19.426 2 16.25 2h-8.5zm0 2h8.5A3.75 3.75 0 0 1 20 7.75v8.5A3.75 3.75 0 0 1 16.25 20h-8.5A3.75 3.75 0 0 1 4 16.25v-8.5A3.75 3.75 0 0 1 7.75 4zm9.75 1.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
      </svg>
      @BoUnit.104
    </a>
  </div>

  <div class="newsletter">
    <h3>NEWSLETTER</h3>
    <p>Sign up to receive exclusive offers.</p>

    <div class="form">
      <input type="email" placeholder="E-mail">
      <button>SUBSCRIBE</button>
    </div>

    <div class="small">By signing up you agree to our policy.</div>
  </div>

</div>

<script>
const container = document.getElementById('particles');
for (let i = 0; i < 25; i++) { // reduced for performance
  const span = document.createElement('span');
  span.style.left = Math.random() * 100 + 'vw';
  span.style.animationDuration = (6 + Math.random() * 6) + 's';
  span.style.opacity = Math.random();
  container.appendChild(span);
}
</script>

</body>
</html>
